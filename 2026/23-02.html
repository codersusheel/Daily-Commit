<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card Hover</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .card {
      width: 280px;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
      text-align: center;
    }

    .content h2 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .content p {
      color: #555;
      font-size: 14px;
    }

    .about {
      background: #111;
      color: #fff;
      padding: 15px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .card:hover .about {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12" alt="Profile">

    <div class="content">
      <h2>Susheel Kumar</h2>
      <p>Web Developer</p>
    </div>

    <div class="about">
      Passionate about coding, UI design, and building creative web projects.
    </div>
  </div>

</body>
</html>
