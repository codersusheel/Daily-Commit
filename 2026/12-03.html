<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        /* Full page height container */
        .container {
            width: 100%;
            min-height: 200vh; /* Scroll check karne ke liye double height */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 5px solid red; /* Border taaki corners dikhen */
        }

        .section {
            padding: 20px;
            font-size: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 50px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container" id="main">
        <div class="section" style="background: navy;">
            <b>TOP EDGE:</b> Yahan se screen shuru ho rahi hai.
        </div>

        <div class="content">
            <h1>Screen Test</h1>
            <p>Niche wale button ko dabayein:</p>
            <button onclick="openFullscreen()">Go Full Screen</button>
            <p style="margin-top: 100px;">Ab niche scroll karke dekhein...</p>
        </div>

        <div class="section" style="background: darkgreen;">
            <b>BOTTOM EDGE:</b> Ye screen ka sabse niche wala hissa hai.
        </div>
    </div>

    <script>
        var elem = document.documentElement;
        function openFullscreen() {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
