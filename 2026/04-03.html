<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi 2026 | Susheelcoder Special</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="holiAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3241/3241517.png" class="floating-img left" alt="Pichkari">
        <img src="https://cdn-icons-png.flaticon.com/512/3241/3241477.png" class="floating-img right" alt="Color Pot">

        <section class="main-card">
            <h1 class="glow-text">Happy <span class="holi-text">Holi</span></h1>
            <p>Rango ka tyohar, khushiyon ki bahaar! 🌈</p>
            <div class="button-group">
                <button id="colorBtn">Rang Barsao! 🎨</button>
                <button id="musicBtn">Music ON/OFF 🎵</button>
            </div>
        </section>
    </div>

    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
