<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Susheelcoder - Pure JS Bulk Certificate Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        
        /* Editor Area */
        .editor { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: left; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-gen { background: #1a237e; color: white; }
        .btn-add { background: #e3f2fd; color: #1a237e; border: 1px solid #1a237e; }

        /* Preview Area */
        .preview { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #certificate-canvas { 
            width: 600px; height: 400px; border: 10px solid #1a237e; background: #fff; 
            position: relative; overflow: hidden; margin: 0 auto;
        }
        .draggable { position: absolute; cursor: move; user-select: none; }
        .cert-name { font-size: 30px; font-weight: bold; border-bottom: 2px solid #333; }
        
        #loading { display: none; color: #1a237e; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>JS Bulk Certificate Generator</h2>

    <div class="main-wrapper">
        <div class="editor">
            <label>Course Name:</label>
            <input type="text" id="course" placeholder="e.g. Web Design" oninput="updatePreview()">
            
            <label>Student Names:</label>
            <div id="nameInputs">
                <input type="text" class="student-name" placeholder="Name 1" oninput="updatePreview()">
            </div>
            
            <button class="btn btn-add" onclick="addInput()">+ Add Name</button>
            <button class="btn btn-gen" onclick="generateEverything()">Download Both ZIPs</button>
            <div id="loading">Processing... Please wait.</div>
        </div>

        <div class="preview">
            <div id="certificate-canvas">
                <div class="draggable" style="top:20px; left:230px; color:#c5a059"><h1>CERTIFICATE</h1></div>
                
                <div id="dragName" class="draggable" style="top:150px; left:180px;">
                    <div class="cert-name" id="prevName">STUDENT NAME</div>
                </div>

                <div id="dragCourse" class="draggable" style="top:250px; left:180px;">
                    <span>Has completed the course:</span><br>
                    <b id="prevCourse">COURSE NAME</b>
                </div>
            </div>
            <p><small>Tip: आप स्क्रीन पर टेक्स्ट को कहीं भी ड्रैग कर सकते हैं!</small></p>
        </div>
    </div>

<script>
    const { jsPDF } = window.jspdf;

    // 1. नए इनपुट फील्ड जोड़ना
    function addInput() {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'student-name';
        input.placeholder = 'Next Name';
        input.oninput = updatePreview;
        document.getElementById('nameInputs').appendChild(input);
    }

    // 2. लाइव प्रीव्यू अपडेट
    function updatePreview() {
        const firstName = document.querySelector('.student-name').value;
        const courseName = document.getElementById('course').value;
        document.getElementById('prevName').innerText = firstName || "STUDENT NAME";
        document.getElementById('prevCourse').innerText = courseName || "COURSE NAME";
    }

    // 3. ड्रैग एंड ड्रॉप लॉजिक
    document.querySelectorAll('.draggable').forEach(el => {
        let x = 0, y = 0, mouseX = 0, mouseY = 0;
        el.onmousedown = (e) => {
            e.preventDefault();
            mouseX = e.clientX;
            mouseY = e.clientY;
            document.onmousemove = (e) => {
                x = mouseX - e.clientX;
                y = mouseY - e.clientY;
                mouseX = e.clientX;
                mouseY = e.clientY;
                el.style.top = (el.offsetTop - y) + "px";
                el.style.left = (el.offsetLeft - x) + "px";
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    });

    // 4. मुख्य फंक्शन: PDF और ZIP बनाना
    async function generateEverything() {
        const loader = document.getElementById('loading');
        loader.style.display = 'block';

        const zipCerts = new JSZip();
        const zipList = new JSZip();
        const courseName = document.getElementById('course').value || "Course";
        const names = document.querySelectorAll('.student-name');
        
        let csvContent = "Name,Course,Date\n";
        const dateNow = new Date().toLocaleString();

        for (let i = 0; i < names.length; i++) {
            let name = names[i].value.trim();
            if (!name) continue;

            // PDF बनाना
            const doc = new jsPDF({ orientation: 'landscape', unit: 'px', format: [600, 400] });
            
            // PDF डिज़ाइन (यह आपके प्रीव्यू के हिसाब से सेट होगा)
            doc.setTextColor(26, 35, 126); // Navy Blue
            doc.setFontSize(40);
            doc.text("CERTIFICATE", 300, 60, { align: "center" });
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(20);
            doc.text("This is to certify that", 300, 120, { align: "center" });
            
            doc.setFontSize(30);
            doc.text(name.toUpperCase(), 300, 170, { align: "center" });
            
            doc.setFontSize(18);
            doc.text("has successfully completed", 300, 220, { align: "center" });
            doc.text(courseName, 300, 250, { align: "center" });

            const pdfBlob = doc.output('blob');
            zipCerts.file(`${name}_Certificate.pdf`, pdfBlob);

            // CSV लिस्ट में जोड़ना
            csvContent += `${name},${courseName},${dateNow}\n`;
        }

        // CSV को ZIP में डालना
        zipList.file("Student_Records.csv", csvContent);

        // ZIPs डाउनलोड करना
        const certZipBlob = await zipCerts.generateAsync({ type: "blob" });
        saveAs(certZipBlob, "All_Certificates.zip");

        const listZipBlob = await zipList.generateAsync({ type: "blob" });
        saveAs(listZipBlob, "Records_List.zip");

        loader.style.display = 'none';
        alert("दोनों ZIP फाइलें डाउनलोड हो गई हैं!");
    }
</script>
</body>
</html>
