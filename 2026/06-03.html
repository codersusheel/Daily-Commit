<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #121212; color: white; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 100%; max-width: 600px; height: 100vh; background: #1e1e1e; display: flex; flex-direction: column; padding: 20px; }
        .hidden { display: none !important; }

        /* Progress Map */
        .progress-map { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .step { width: 32px; height: 32px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 1px solid #444; }
        .step.correct { background: #2e7d32; border-color: #4caf50; }
        .step.wrong { background: #c62828; border-color: #f44336; }
        .step.active { border: 2px solid #1a73e8; box-shadow: 0 0 10px #1a73e8; }

        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #question-text { font-size: 1.5rem; margin-bottom: 30px; padding: 0 10px; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: #333; border: 1px solid #555; color: white; border-radius: 12px; padding: 25px 10px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        
        /* Feedback Colors */
        .correct-ans { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong-ans { background: #c62828 !important; border-color: #f44336 !important; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 20px; }
        .btn-main { background: #1a73e8; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; width: fit-content; }
        .btn-leave { background: #444; margin-top: 10px; }

        #timer { color: #ff9800; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; }
        #feedback-text { margin: 15px 0; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen">
        <h1 style="font-size: 2.5rem; color: #1a73e8;">Quiz Game</h1>
        <p style="color: #aaa; margin: 20px 0;">Is game mein 10 sawal honge. Har sahi jawab par points milenge.</p>
        <button class="btn-main" onclick="startGame()">Game Start Karein</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="progress-map" id="map"></div>
        <div id="timer">Time: 0s</div>
        <div id="question-text">Question?</div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-text"></div>
        <button id="next-btn" class="btn-main hidden" onclick="loadNext()">Next Question</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h1>Final Result</h1>
        <div id="final-stats" style="margin: 30px 0; font-size: 1.2rem; line-height: 2;"></div>
        <div class="btn-group">
            <button class="btn-main" onclick="startGame()">Restart Game</button>
            <button class="btn-main btn-leave" onclick="goHome()">Leave / Home</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "Bharat ki rajdhani?", a: ["Delhi", "Mumbai", "Goa", "Pune"], c: 0 },
        { q: "Suraj kaha se ugta hai?", a: ["West", "East", "North", "South"], c: 1 },
        { q: "Asman ka rang?", a: ["Lal", "Hara", "Neela", "Kala"], c: 2 },
        { q: "Hafte me kitne din?", a: ["5", "7", "6", "8"], c: 1 },
        { q: "Taj Mahal kaha hai?", a: ["Agra", "Delhi", "Patna", "Mumbai"], c: 0 },
        { q: "2 + 2 = ?", a: ["3", "4", "5", "22"], c: 1 },
        { q: "National Fruit?", a: ["Apple", "Mango", "Banana", "Grapes"], c: 1 },
        { q: "Computer Brain?", a: ["Mouse", "CPU", "RAM", "UPS"], c: 1 },
        { q: "Cricket Ball in over?", a: ["4", "8", "6", "10"], c: 2 },
        { q: "Earth shape?", a: ["Square", "Round", "Flat", "Triangle"], c: 1 },
        { q: "Prime Minister India?", a: ["Modi", "Rahul", "Kejriwal", "Amit"], c: 0 },
        { q: "Rainbow colors?", a: ["5", "6", "7", "8"], c: 2 },
        { q: "Cow gives us?", a: ["Egg", "Milk", "Wool", "Honey"], c: 1 },
        { q: "King of Jungle?", a: ["Tiger", "Lion", "Fox", "Bear"], c: 1 },
        { q: "Human hands?", a: ["1", "3", "2", "4"], c: 2 },
        { q: "Fastest Animal?", a: ["Tiger", "Cheetah", "Deer", "Horse"], c: 1 },
        { q: "Capital of UP?", a: ["Lucknow", "Kanpur", "Agra", "Noida"], c: 0 },
        { q: "Moon is a...?", a: ["Star", "Planet", "Satellite", "Comet"], c: 2 },
        { q: "Baraf kis se banti hai?", a: ["Oil", "Milk", "Water", "Juice"], c: 2 },
        { q: "Year has how many months?", a: ["10", "12", "11", "14"], c: 1 }
    ];

    let currentSet = [], qIdx = 0, score = 0, time = 0, timer;

    function startGame() {
        currentSet = [...questions].sort(() => 0.5 - Math.random()).slice(0, 10);
        qIdx = 0; score = 0; time = 0;
        showScreen('quiz-screen');
        buildMap();
        startTimer();
        loadQuestion();
    }

    function buildMap() {
        const map = document.getElementById('map');
        map.innerHTML = '';
        for(let i=0; i<10; i++) map.innerHTML += `<div class="step" id="s-${i}">${i+1}</div>`;
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => { time++; document.getElementById('timer').innerText = `Time: ${time}s`; }, 1000);
    }

    function loadQuestion() {
        const q = currentSet[qIdx];
        document.getElementById('feedback-text').innerText = '';
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('question-text').innerText = q.q;
        
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`s-${qIdx}`).classList.add('active');

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAns(btn, i);
            container.appendChild(btn);
        });
    }

    function checkAns(btn, choice) {
        const correct = currentSet[qIdx].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(choice === correct) {
            btn.classList.add('correct-ans');
            document.getElementById(`s-${qIdx}`).classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong-ans');
            btns[correct].classList.add('correct-ans');
            document.getElementById(`s-${s-qIdx}`).classList.add('wrong');
            document.getElementById('feedback-text').innerText = "Wrong! Sahi jawab: " + currentSet[qIdx].a[correct];
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function loadNext() {
        qIdx++;
        if(qIdx < 10) loadQuestion();
        else finish();
    }

    function finish() {
        clearInterval(timer);
        showScreen('result-screen');
        document.getElementById('final-stats').innerHTML = `
            <p>Sahi Jawab: <span style="color:#4caf50">${score}</span></p>
            <p>Galat Jawab: <span style="color:#f44336">${10 - score}</span></p>
            <p>Waqt: ${time} Seconds</p>
        `;
    }

    function goHome() {
        showScreen('start-screen');
    }

    function showScreen(id) {
        ['start-screen', 'quiz-screen', 'result-screen'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
