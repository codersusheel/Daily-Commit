<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Today's Vibe</title>
    <style>
        body {
            background: #0d1117; /* GitHub Dark Theme */
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            background: #161b22;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; }
        .status {
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 10px;
            background: #21262d;
            border-radius: 5px;
        }
        .btn {
            color: #238636;
            text-decoration: none;
            border: 1px solid rgba(240,246,252,0.1);
            padding: 5px 15px;
            border-radius: 6px;
            background: #21262d;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Susheelcoder's Log</h1>
        <div class="status">
            Today's Vibe: ☕ No Code, Just Commits.
        </div>
        <p>GitHub Pull: <strong>Done ✅</strong></p>
        <br>
        <a href="https://github.com" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
