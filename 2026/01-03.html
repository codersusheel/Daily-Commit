<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python in HTML</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #output { margin-top: 20px; font-weight: bold; color: #2c3e50; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Susheelcoder's Python-HTML Test</h1>
        <p>Niche wala button Python code trigger karega:</p>
        
        <button id="my-button" py-click="say_hello" style="padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px;">
            Python Run Karo!
        </button>

        <div id="output"></div>
    </div>

    <script type="py">
        from pyscript import display, document

        def say_hello(event):
            # HTML element ko select karke usme text dalna
            output_div = document.querySelector("#output")
            output_div.innerText = "Kya baat hai! Python HTML ke andar chal rahi hai! 🚀"
            print("Console mein bhi print ho raha hai!")
    </script>

</body>
</html>
