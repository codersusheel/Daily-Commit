<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python + HTML Tool</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .container { background: white; width: 300px; margin: 50px auto; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Interest Calculator</h2>
        <form method="POST">
            <input type="number" name="p" placeholder="Principal Amount" required>
            <input type="number" step="0.01" name="r" placeholder="Rate of Interest (%)" required>
            <input type="number" name="t" placeholder="Time (Years)" required>
            <button type="submit">Calculate</button>
        </form>

        {% if result is not none %}
            <h3>Result: ₹{{ result }}</h3>
        {% endif %}
    </div>
</body>
</html>
