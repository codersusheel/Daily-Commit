<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Birthday Card</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --bg-gradient: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ff9a9e;
            background-image: linear-gradient(120deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Balloons Animation */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.7;
            z-index: 0;
            animation: float 8s infinite ease-in;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        /* The Card Container */
        .card-container {
            position: relative;
            width: 320px;
            height: 420px;
            perspective: 1500px;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .card.open {
            transform: rotateY(-150deg);
        }

        .card-front, .card-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background: var(--primary);
            color: white;
            z-index: 2;
            border: 5px solid #fff;
        }

        .card-inside {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #333;
            transform: rotateY(180deg);
            z-index: 1;
            border: 5px solid var(--secondary);
        }

        .btn-open {
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .emoji { font-size: 60px; margin-bottom: 10px; }

    </style>
</head>
<body>

    <script>
        for(let i=0; i<15; i++) {
            let b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDelay = Math.random() * 5 + 's';
            b.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            document.body.appendChild(b);
        }
    </script>

    <div class="card-container" onclick="this.querySelector('.card').classList.toggle('open')">
        <div class="card">
            <div class="card-front">
                <div class="emoji">🎁</div>
                <h1>A Special Surprise for You!</h1>
                <p>Click to Unfold</p>
                <div class="btn-open">Open Me</div>
            </div>
            
            <div class="card-inside">
                <div class="emoji">🎂</div>
                <h2>Happy Birthday!</h2>
                <p>Tum jiyo hazaron saal, saal ke din hon pachas hazar! ✨</p>
                <hr style="width: 50%; border: 1px solid var(--secondary); margin: 15px 0;">
                <p style="font-style: italic; font-size: 0.9rem;">Enjoy your special day to the fullest!</p>
                <div class="emoji" style="font-size: 30px;">🎈 🎊 🍦</div>
            </div>
        </div>
    </div>

</body>
</html>
