<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Birthday Card</title>
    <style>
        /* CSS Styles */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7d9d9;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: 300px;
            height: 400px;
            cursor: pointer;
            perspective: 1000px;
        }

        /* Card ki inner body */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .card.open .card-inner {
            transform: rotateY(-130deg);
        }

        /* Front aur Back Faces */
        .front, .inside {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .front {
            background-color: #ff6b6b;
            color: white;
            z-index: 2;
        }

        .inside {
            background-color: white;
            color: #333;
            transform: rotateY(180deg);
            z-index: 1;
        }

        h1 { margin: 10px 0; }
        p { font-size: 1.1rem; line-height: 1.5; }

        .cake { font-size: 50px; }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="card" onclick="toggleCard()">
        <div class="card-inner">
            <div class="front">
                <div class="cake">🎂</div>
                <h1>Happy Birthday!</h1>
                <p>Tap to Open</p>
            </div>
            <div class="inside">
                <h2>Dear Friend,</h2>
                <p>Aapka din khushiyon se bhara ho! Bhagwan kare aapko wo sab mile jo aap chahte hain. 🎉</p>
                <div class="cake">🎈🎁</div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript for Interaction
        function toggleCard() {
            const card = document.querySelector('.card');
            card.classList.toggle('open');
            
            if(card.classList.contains('open')) {
                startConfetti();
            }
        }

        // Simple Confetti Effect
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        function startConfetti() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 7 + 3,
                    speed: Math.random() * 3 + 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            if (particles[0].y < canvas.height) {
                requestAnimationFrame(animate);
            }
        }
    </script>
</body>
</html>
