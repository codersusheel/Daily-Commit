
<!DOCTYPE html>
<html>
<head>
    <title>Special Proposal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fce7f3, #e0e7ff); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h1 { color: #831843; }
        p { color: #4b5563; line-height: 1.6; }
        input { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid #fbcfe8; border-radius: 10px; }
        button { background: #db2777; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 30px; padding: 20px; border-top: 2px dashed #fbcfe8; display: none; }
        .shayari { font-style: italic; font-size: 1.3rem; color: #1e293b; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>Dil Ki Baat</h1>
    <p>Har kisi ke dil mein ek kahani hoti hai, aur meri kahani tumhare naam se shuru hoti hai. Apna naam batayein?</p>
    
    <input type="text" id="name" placeholder="Yahan apna naam likhein...">
    <br>
    <button onclick="showProposal()">Dekhein Kya Likha Hai</button>

    <div id="result">
        <div class="shayari" id="msg"></div>
        <button style="background: #0f172a; margin-top: 10px;" onclick="alert('Woh keh rahi hain: Haan! 😍')">Accept</button>
    </div>
</div>

<script>
    function showProposal() {
        let name = document.getElementById("name").value;
        if(name === "") return alert("Naam toh batao!");
        
        const shayaris = [
            `Chand ki chandni se bhi zyada noor hai tum mein, ${name},<br>Isliye toh itna suroor hai tum mein.`,
            `${name}, tumhari aankhon mein basta hai mera jahan,<br>Kya tum banogi meri zindagi ka karwaan?`,
            `Duniya ki bheed mein ek tum hi toh ho, ${name},<br>Jisne meri dhadkanon ko hai naam diya.`
        ];
        
        let randomShayari = shayaris[Math.floor(Math.random() * shayaris.length)];
        document.getElementById("msg").innerHTML = randomShayari;
        document.getElementById("result").style.display = "block";
    }
</script>
  
  
  
  
  
  
  
  
  
  
  
<form class="contact-form">
    <div class="form-group">
        <input type="text" id="name" name="name" placeholder=" " required />
        <label for="name">Full Name</label>
    </div>

    <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required />
        <label for="email">Email Address</label>
    </div>

    <div class="form-group">
        <input type="text" id="subject" name="subject" placeholder=" " required />
        <label for="subject">Subject</label>
    </div>

    <div class="form-group">
        <textarea id="message" name="message" rows="4" placeholder=" " required></textarea>
        <label for="message">Message</label>
    </div>

    <button type="submit">Send Message</button>
</form>




<style>
    /* Floating Label Contact Form */
    .contact-form {
        max-width: 500px;
        margin: auto;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-group {
        position: relative;
        margin-bottom: 25px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 14px 12px;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
    }

    .form-group label {
        position: absolute;
        left: 12px;
        top: 14px;
        background-color: #fff;
        padding: 0 4px;
        color: #888;
        font-size: 1rem;
        pointer-events: none;
        transition: 0.3s ease all;
    }

    /* When input is focused or has text */
    .form-group input:focus+label,
    .form-group input:not(:placeholder-shown)+label,
    .form-group textarea:focus+label,
    .form-group textarea:not(:placeholder-shown)+label {
        top: -10px;
        left: 8px;
        font-size: 0.8rem;
        color: #007bff;
    }

    button {
        padding: 12px 25px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
    }

    button:hover {
        background-color: #0056b3;
    }
</style>


</body>
</html>
