<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #121212; color: white; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 100%; max-width: 600px; height: 100vh; background: #1e1e1e; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .hidden { display: none !important; }

        /* Progress Map (Stepper) */
        .progress-map { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 10px; }
        .step { width: 30px; height: 30px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: 0.3s; }
        .step.correct { background: #4caf50; }
        .step.wrong { background: #f44336; }
        .step.active { border: 2px solid #1a73e8; transform: scale(1.2); }

        /* Quiz Elements */
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #question-text { font-size: 1.4rem; margin: 20px 0; min-height: 60px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option-btn { background: #333; border: 1px solid #444; color: white; border-radius: 10px; padding: 25px 15px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .option-btn:disabled { cursor: default; opacity: 0.8; }
        
        /* Feedback Colors */
        .correct-ans { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong-ans { background: #c62828 !important; border-color: #f44336 !important; }

        .btn-main { background: #1a73e8; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; align-self: center; }
        #timer { color: #ff9800; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        #feedback-msg { height: 30px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen">
        <h1>Quiz Game</h1>
        <p style="color: #bbb; margin-top: 10px;">20 questions me se 10 random sawal puche jayenge. Har sawal ke baad result dikhega.</p>
        <button class="btn-main" onclick="startGame()">Chalo Shuru Karein</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="progress-map" id="map"></div>
        <div id="timer">Time: 0s</div>
        <div id="question-text">Question loading...</div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-msg"></div>
        <button id="next-btn" class="btn-main hidden" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h1>Final Result</h1>
        <div id="final-stats" style="margin: 20px 0; line-height: 2;"></div>
        <button class="btn-main" onclick="location.reload()">Restart Game</button>
    </div>
</div>

<script>
    const allQuestions = [
        { q: "Bharat ki rajdhani?", a: ["Delhi", "Mumbai", "Goa", "Pune"], c: 0 },
        { q: "Suraj kaha se ugta hai?", a: ["West", "East", "North", "South"], c: 1 },
        { q: "Asman ka rang?", a: ["Lal", "Hara", "Neela", "Kala"], c: 2 },
        { q: "Hafte me kitne din?", a: ["5", "7", "6", "8"], c: 1 },
        { q: "Taj Mahal kaha hai?", a: ["Agra", "Delhi", "Patna", "Mumbai"], c: 0 },
        { q: "2 + 2 = ?", a: ["3", "4", "5", "22"], c: 1 },
        { q: "National Fruit?", a: ["Apple", "Mango", "Banana", "Grapes"], c: 1 },
        { q: "Computer Brain?", a: ["Mouse", "CPU", "RAM", "UPS"], c: 1 },
        { q: "Cricket Ball count in over?", a: ["4", "8", "6", "10"], c: 2 },
        { q: "Earth shape?", a: ["Square", "Round", "Flat", "Triangle"], c: 1 },
        { q: "Prime Minister of India?", a: ["Modi", "Rahul", "Kejriwal", "Amit"], c: 0 },
        { q: "Rainbow colors?", a: ["5", "6", "7", "8"], c: 2 },
        { q: "Cow gives us?", a: ["Egg", "Milk", "Wool", "Honey"], c: 1 },
        { q: "King of Jungle?", a: ["Tiger", "Lion", "Fox", "Bear"], c: 1 },
        { q: "Human hands?", a: ["1", "3", "2", "4"], c: 2 },
        { q: "Fastest Animal?", a: ["Tiger", "Cheetah", "Deer", "Horse"], c: 1 },
        { q: "Capital of UP?", a: ["Lucknow", "Kanpur", "Agra", "Noida"], c: 0 },
        { q: "Moon is a...?", a: ["Star", "Planet", "Satellite", "Comet"], c: 2 },
        { q: "Baraf kis se banti hai?", a: ["Oil", "Milk", "Water", "Juice"], c: 2 },
        { q: "Year has how many months?", a: ["10", "12", "11", "14"], c: 1 }
    ];

    let quizSet = [], qIdx = 0, score = 0, time = 0, timer;

    function startGame() {
        quizSet = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        qIdx = 0; score = 0; time = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        setupMap();
        startTimer();
        loadQuestion();
    }

    function setupMap() {
        const map = document.getElementById('map');
        map.innerHTML = '';
        for(let i=1; i<=10; i++) {
            map.innerHTML += `<div class="step" id="step-${i-1}">${i}</div>`;
        }
    }

    function startTimer() {
        timer = setInterval(() => { time++; document.getElementById('timer').innerText = `Time: ${time}s`; }, 1000);
    }

    function loadQuestion() {
        const q = quizSet[qIdx];
        document.getElementById('feedback-msg').innerText = '';
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('question-text').innerText = q.q;
        
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${qIdx}`).classList.add('active');

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, i) => {
            container.innerHTML += `<button class="option-btn" onclick="check(this, ${i})">${opt}</button>`;
        });
    }

    function check(btn, choice) {
        const correct = quizSet[qIdx].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(choice === correct) {
            btn.classList.add('correct-ans');
            document.getElementById(`step-${qIdx}`).classList.add('correct');
            document.getElementById('feedback-msg').innerText = "Shabash! Sahi Jawab.";
            score++;
        } else {
            btn.classList.add('wrong-ans');
            btns[correct].classList.add('correct-ans'); // Sahi answer highlight karna
            document.getElementById(`step-${qIdx}`).classList.add('wrong');
            document.getElementById('feedback-msg').innerText = "Oho! Sahi jawab: " + quizSet[qIdx].a[correct];
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        qIdx++;
        if(qIdx < 10) loadQuestion();
        else end();
    }

    function end() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerHTML = `
            <p>Sahi: ${score}</p>
            <p>Galat: ${10 - score}</p>
            <p>Waqt: ${time} Seconds</p>
        `;
    }
</script>
</body>
</html>
