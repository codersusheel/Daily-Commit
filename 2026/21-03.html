<!DOCTYPE html>
<html lang="hi">
<head>
<style>
  .calendar {
    font-family: Arial, sans-serif;
    width: 300px;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 8px;
  }
  .header {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 1.2em;
  }
  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
  }
  .day-name { font-weight: bold; color: #555; }
  .date { padding: 8px 0; }
  
  /* Highlight style */
  .highlight {
    background-color: #ff3e3e;
    color: white;
    border-radius: 50%;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="calendar">
  <div class="header">August 2026</div>
  <div class="days">
    <div class="day-name">S</div><div class="day-name">M</div><div class="day-name">T</div>
    <div class="day-name">W</div><div class="day-name">T</div><div class="day-name">F</div>
    <div class="day-name">S</div>
    
    <div class="date"></div><div class="date"></div><div class="date"></div>
    <div class="date"></div><div class="date"></div><div class="date"></div>
    <div class="date">1</div>
    
    <div class="date">2</div><div class="date">3</div><div class="date">4</div>
    <div class="date">5</div><div class="date">6</div><div class="date">7</div>
    <div class="date">8</div><div class="date">9</div><div class="date">10</div>
    <div class="date">11</div><div class="date">12</div><div class="date">13</div>
    <div class="date">14</div><div class="date">15</div><div class="date">16</div>
    <div class="date">17</div><div class="date">18</div><div class="date">19</div>
    <div class="date">20</div><div class="date">21</div><div class="date">22</div>
    <div class="date">23</div>
    <div class="date highlight">24</div> <div class="date">25</div><div class="date">26</div><div class="date">27</div>
    <div class="date">28</div><div class="date">29</div><div class="date">30</div>
    <div class="date">31</div>
  </div>
</div>

</body>
</html>
