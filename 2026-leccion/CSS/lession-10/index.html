<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lession-10</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-width: 100vh;
        font: 2.5em sans-serif;

        background-color: beige;
        background-image: radial-gradient(rgb(179, 173, 173), rgb(89, 88, 87));
        display: flex;
        flex-direction: column;
    }

    header,
    nav,
    main,
    footer {
        width: 100%;
        display: grid;
        place-content: center;
        grid-template-columns: 100%;
        text-align: center;

    }

    header,
    footer {
        position: sticky;
        background-color: rgba(16, 15, 15, 0.638);
        color: white;
    }

    header {
        top: 0;
    }

    nav {
        background-color: whitesmoke;
        color: black;
        padding: 0.5rem;
        border-bottom: 2px solid black;
    }

    main {
        flex-grow: 1px;
        height: 100vh;
        text-align: center;
    }



    .footer {
        position: fixed;
        bottom: 0%;
    }

    @media screen and (min-width:576px) {
        body{
            background-color: green;
            background-image: radial-gradient(
                white,green
            );
        }
        nav{
            display: none;
        }
    }
</style>

<body>

    <header>
        header
        <nav>nav</nav>
    </header>

    <main>
        main
    </main>
    <footer class="footer">
        footer
    </footer>


</body>

</html>
