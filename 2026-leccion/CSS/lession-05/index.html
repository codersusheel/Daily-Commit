<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lession-05</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        grid-area: ft;
        min-height: 400px;
        display: grid;
        grid-template-columns: repeat(2, 1fr 2fr);
        grid-auto-rows: minmax(15px, auto);
        gap: 1rem;

    }

    .box {
        background-color: black;
        color: aliceblue;
        font-size: 2rem;
    }

    .box:first-child {
        background-color: rgb(0, 42, 255);
        /* grid-column-start: 1; */
        /* grid-column-end: 4; */
        grid-column: 1/4;
        grid-row: 1/3;


        display: grid;
        /* align-content: start; */
        /* align-content: end; */
        /* align-content: center; */
        /* justify-content: center; */
        /* justify-content: start; */
        /* justify-content: end; */
        /* place-content: center start; */
        place-content: center;
    }

    .box:nth-child(2) {
        background-color: brown;
        grid-column: 1/5;
        grid-row: 3/4;
    }
</style>

<body>
    <header class="header el">
        <h1>header</h1>
    </header>
    <main class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>

    </main>
    <aside class="aside el">
        <h2>aside</h2>
    </aside>
    <footer class="footer el">
        <h2>fooret</h2>
    </footer>

</body>

</html>
