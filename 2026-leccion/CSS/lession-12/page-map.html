<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page demo</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #222;
        }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #000;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        header a {
            color: #fff;
            text-decoration: none;
        }

        header nav a {
            margin-left: 20px;
        }

        header nav a:hover {
            color: #00bcd4;
        }

        /* ===== MAIN ===== */
        main {
            background-color: #fff;
        }

        #hero-section {
            position: relative;
            /* IMPORTANT */
            background-image: url("/CSS/Assets/01.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            z-index: 1;
        }

        #hero-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(0, 0, 0);
            z-index: -1;
        }


        /* ===== SECTIONS ===== */
        section {
            max-width: 1200px;
            margin: auto;
            height: 100vh;
            padding: 100px 20px;
        }

        #hero-section {
            max-width: 100%;
            color: #f5f5f5;
        }

        #about {
            background: #ffffff;
        }

        #project {
            background: #00000000;
        }

        #contact {
            background: #ffffff;
        }

        /* ===== FOOTER ===== */
        footer {
            background: #222;
            color: #fff;
            text-align: center;
            padding: 15px;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            header {
                flex-direction: column;
            }

            header nav {
                margin-top: 10px;
            }

            header nav a {
                margin: 0 10px 0 0;
                display: inline-block;
            }

            section {
                padding: 80px 15px;
                min-height: auto;

            }
        }
    </style>

</head>

<body>
    <header id="header">
        <h2><a href="/">page demo</a></h2>
        <nav id="nav">
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#project">Project</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main id="main">

        <section id="hero-section">
            <section>
                <h2>hero-section</h2>
            </section>
        </section>

        <section id="about">
            <h2>About section </h2>
        </section>
        <section id="project">
            <h2> project section</h2>
        </section>
        <section id="contact">
            <h2>contact section</h2>
        </section>
    </main>
    <footer id="footer">
        <p>&copy; demo page </p>
    </footer>

</body>

</html>
