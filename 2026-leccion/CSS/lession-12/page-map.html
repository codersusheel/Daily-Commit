<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page demo</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            max-width: 100%;
            min-height: 100vh;
            background-color: aliceblue;
            color: black;
            opacity: 0.9;
        }

        /* ====== header  ====== */
        #header {
            top: 0;
            width: 100%;
            background-color: black;
            color: aliceblue;
            padding: 10px 20px;

            position: fixed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        #header a {
            color: rgb(169, 177, 173);
            text-decoration: dotted;
        }

        #header nav a {
            color: wheat;
            text-decoration: dashed;
            padding: 0 10px;
        }

        #header a:hover {
            color: aqua;
            text-decoration: overline;
        }


        /* === footer === */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgb(32, 31, 29);
            color: aliceblue;
            text-align: center;
        }


        /* === Dastop size ==== */
        @media screen and (min-width:1000px) {

            body {
                font-size: 1.5rem;
                background-color: white;
            }

            /* main {
                background-image: url("/Assets/01.jpg");
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
            }

            main::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgb(0, 0, 0);
                z-index: -1;
            } */


        }

        /* ===== min section ========= */
        #main {
            background-color: rgb(0, 0, 0);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #hero-section {
            color: #ffffff;
        }

        section {
            color: rgb(0, 0, 0);
            width: 1200px;
            margin: auto;
            min-height: 100vh;
            position: block;
            position: sticky;
            z-index: 0;
            padding: 100px 0;
        }
    </style>
</head>

<body>
    <header id="header">
        <h2><a href="/">page demo</a></h2>
        <nav>
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#project">Project</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main id="main">
        <section id="hero-section">
            <h2>hero-section</h2>
        </section>

        <section id="about">
            <h2>About section </h2>
        </section>
        <section id="project">
            <h2> project section</h2>
        </section>
        <section id="contact">
            <h2>contact section</h2>
        </section>
    </main>
    <footer id="footer">
        <p>&copy; demo page </p>
    </footer>

</body>

</html>
