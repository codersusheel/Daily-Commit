<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS lession-01</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        margin: 50px;
    }

    .container {
        border: 10px dotted red;
        font-size: 1.5rem;
        margin: 1.5em;
        padding: 1.5em;
        outline: 5px solid purple;
        /* outline-offset: -20px; */
        outline-offset: 10px;
    }

    .circle {
        margin: 3rem auto;
        background-color: gold;
        width: 100px;
        height: 100px;
        border: 2px solid #000;
        border-radius: 50px;
        outline: 2px solid red;
        outline-offset: 0.25rem;
    }

    ul {
        list-style-type: square;
        list-style-position: inside;
        text-align: center;
        font-size: 90px;
        list-style-type: lower-greek;
    }

    ol {
        list-style-type: square;
        list-style-position: inside;
        text-align: center;
        list-style-image: url(https://img.icons8.com/?size=100&id=39050&format=png&color=000000);
        font-size: 90px;
    }

    .ul ::marker {
        color: #cd6e6e;
        content: "day:";
    }
</style>

<body>



    <div class="container">
        <h1>CSS lession-01</h1>
    </div>


    <div class="container">
        <p>
            Lorem, ipsum dolor sit amet consectetur adipisicing elit. Dolorem maxime totam in repellendus amet quod
            nobis
            ducimus obcaecati officia libero?
        </p>
        <div class="circle"></div>
    </div>


    <div>
        <ul>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </ul>

        <ul class="ul">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </ul>
    </div>

    <div>
        <Ol>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </Ol>
    </div>
</body>

</html>
