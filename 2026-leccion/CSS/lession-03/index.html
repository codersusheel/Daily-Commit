<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lession-03</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html{ scroll-behavior: smooth;}

    .blue{
        background-color: blue;
    }
    #one{color: antiquewhite;}
    #two{color: rgb(0, 255, 89);}
    #three{color: rgb(255, 39, 208);}


    section {
        height: 100vh;
    }


    header,
    footer {
        height: 100px;
        font-size: 5rem;
        text-align: center;

    }

    header {
        position: sticky;
        top: 0;
    }

    footer {
        background-color: bisque;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
    .social{
        position: fixed;
        font-size: inherit;
        padding: 1rem;
        top: 30%;
        left: 0;
        z-index: 1;

    }
</style>


<body>
    <button class="social">🚀</button>
    <section id="one">
        <header class="blue">Header one </header>
        <h2>one</h2>
    </section>
    <section id="two">
        <header class="blue">Header two </header>
        <h2>two</h2>
    </section>
    <section id="three">
        <header class="blue">Header three </header>
        <h2>three</h2>
    </section>
    <footer>
        <a href="#one">one</a>
        <a href="#two">two</a>
        <a href="#three">three</a>
    </footer>
</body>

</html>
