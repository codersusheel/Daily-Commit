<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lession-07</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            background-color: aliceblue;
            color: black;
        }


        body {
            min-height: 100vh;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-auto-rows: 75px auto 75px;
            grid-template-areas:
                "hd hd hd hd hd hd hd hd  hd hd "
                "sbs mn mn mn mn mn mn mn sb sb "
                "ft ft ft ft ft ft ft ft  ft ft "
            ;
            gap: 0.5rem;
            column-gap: 0.5rem;
        }

        .el {
            background-color: blueviolet;
            color: white;
            display: grid;
            place-content: center;
        }


        .header {
            grid-area: hd;
            background-color: rgb(255, 145, 0);
        }

        .sidebars {
            grid-area: sbs;
            background-color: rgb(0, 0, 0);
        }

        .container {
            grid-area: mn;
            background-color: rgb(255, 3, 3);
        }

        .sidebar {
            grid-area: sb;
            background-color: rgb(51, 255, 0);
        }

        .footer {
            position: sticky;
            grid-area: ft;
            background-color: rgb(0, 47, 255);
        }

        .container {
            grid-area: mn;
            background-color: rgb(255, 3, 3);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }


    </style>
</head>

<body>
    <header class="header el">
        <h1>header</h1>
    </header>
    <aside class="sidebars el">
        <h2>Aside</h2>
    </aside>
    <main class="container el">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">6</div>
        <div class="box">6</div>
        <div class="box">6</div>
        <div class="box">6</div>
        <div class="box">6</div>
    </main>
    <aside class="sidebar el">
        <h2>Aside</h2>
    </aside>
    <footer class="footer el">
        <h2>Fooret</h2>
    </footer>


</body>

</html>
