<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Contact Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        form {
            max-width: 400px;
            background: #fff;
            padding: 20px;
            margin: 40px auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <form id="contactForm">
        <h2>Contact Us</h2>
        <input type="hidden" name="ID" id="autoID">

        <input type="text" name="full_Name" placeholder="Full Name" required>
        <input type="email" name="g_email" placeholder="Email" required>
        <input type="number" name="phone_Number" placeholder="Phone Number" >
        <input type="text" name="user-Name" placeholder="Username">
        <input type="text" name="company_Name" placeholder="Company NAME" >

        <input type="text" name="school_name" placeholder="School / Institute Name">
        <input type="text" name="company_Website" placeholder="Company  URL">

        <input type="text" name="city" placeholder="city">
        <input type="text" name="subject" placeholder="subject">
        <input type="text" name="linkedIn_Profile" placeholder="LinkedIn_Profile">
        <input type="text" name="position_Hiring_For" placeholder="Position_Hiring_For">
        <input type="text" name="employment_Type" placeholder="Employment_Type">
        <input type="number" name="company_Size" placeholder="Company_Size">
        <input type="text" name="Interest" placeholder="Interest">
        <input type="text" name="rating" placeholder="Rating">

        <textarea name="Message" placeholder="Your Message"></textarea>

        <!-- Hidden Fields -->
        <input type="hidden" name="Page_Source" value="general_form">
        <input type="hidden" name="Date">
        <input type="hidden" name="Time">

        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let form = e.target;
            let data = new FormData(form);


            // ✅ Auto Increment ID (page session)
            if (!localStorage.getItem("formCounter")) {
                localStorage.setItem("formCounter", 0);
            }

            let count = parseInt(localStorage.getItem("formCounter")) + 1;
            localStorage.setItem("formCounter", count);

            // Final ID
            let autoID = "#" + count;
            data.set("ID", autoID);


            // Set Date & Time
            let now = new Date();
            data.set("Date", now.toLocaleDateString());
            data.set("Time", now.toLocaleTimeString());

            fetch("https://sheetdb.io/api/v1/3j5wmhm6f1i2b", {
                method: "POST",
                body: data
            })
                .then(response => response.json())
                .then(result => {
                    alert("Form Submitted Successfully!");
                    form.reset();
                })
                .catch(error => {
                    alert("Error submitting form");
                    console.error(error);
                });
        });
    </script>

</body>

</html>
