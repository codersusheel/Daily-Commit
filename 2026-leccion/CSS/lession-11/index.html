<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All In One General Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1f2933, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-box {
            background: #0b1220;
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        }

        .form-box h2 {
            color: #00f7ff;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #fff;
            outline: none;
            font-size: 15px;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: #00f7ff;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            margin: 15px 0;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 28px;
            color: #334155;
            cursor: pointer;
            transition: 0.3s;
        }

        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00f7ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00f7ff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ff;
            box-shadow: 0 0 12px #00f7ff;
        }

        footer {
            margin-top: 15px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>

<body>


    <!-- 
    <input type="hidden" name="page_source" value="general_form">
    <input type="hidden" name="page_source" value="support_form">
    <input type="hidden" name="page_source" value="hr_form">
    <input type="hidden" name="page_source" value="contact_form">
    <input type="hidden" name="page_source" value="feedback_form">
    <input type="hidden" name="page_source" value="Haproven_form"> -->


    <div class="form-box">

        <h2>All In One General Form</h2>

        <form method="post" enctype="multipart/form-data">

            <!-- ================= HIDDEN SYSTEM ================= -->
            <input type="hidden" name="page_source" value="general_form">
            <input type="hidden" name="date" id="date">
            <input type="hidden" name="time" id="time">

            <!-- ================= BASIC USER INFO ================= -->
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <input type="text" name="username" placeholder="Username">
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Your Email / HR Email" required>
            </div>

            <div class="input-group">
                <input type="tel" name="phone" placeholder="Phone / WhatsApp Number">
            </div>

            <div class="input-group">
                <input type="text" name="school_name" placeholder="School / Institute Name">
            </div>

            <div class="input-group">
                <input type="text" name="city" placeholder="City">
            </div>

            <!-- ================= HR / COMPANY INFO ================= -->
            <div class="input-group">
                <input type="text" name="subject" placeholder="Subject">
            </div>

            <div class="input-group">
                <input type="text" name="company_name" placeholder="Company Name">
            </div>

            <div class="input-group">
                <input type="url" name="company_website" placeholder="Company Website URL">
            </div>

            <div class="input-group">
                <input type="url" name="linkedin_profile" placeholder="LinkedIn Profile URL">
            </div>

            <div class="input-group">
                <input type="url" name="github_profile" placeholder="GitHub Profile URL">
            </div>

            <div class="input-group">
                <input type="text" name="hiring_role" placeholder="Position Hiring For">
            </div>

            <div class="input-group">
                <select name="employment_type">
                    <option value="">Employment Type</option>
                    <option>Internship</option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Contract</option>
                    <option>Freelance</option>
                </select>
            </div>

            <div class="input-group">
                <select name="company_size">
                    <option value="">Company Size</option>
                    <option>1–10 Employees</option>
                    <option>11–50 Employees</option>
                    <option>51–200 Employees</option>
                    <option>201–500 Employees</option>
                    <option>500+</option>
                </select>
            </div>

            <!-- ================= INTEREST ================= -->
            <div class="input-group">
                <select name="interest">
                    <option value="">Your Interest</option>
                    <option>Web Development</option>
                    <option>App Development</option>
                    <option>UI / UX Design</option>
                    <option>AI / ML</option>
                    <option>Hackathons</option>
                    <option>Support</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- ================= FEEDBACK STAR RATING ================= -->
            <div class="stars">
                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
            </div>

            <!-- ================= MESSAGE ================= -->
            <div class="input-group">
                <textarea name="message" placeholder="Write your message / experience..."></textarea>
            </div>


            <button type="submit">Submit Now</button>

        </form>

        <footer>Powered by Susheelcoder</footer>

    </div>




    <script>
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let form = e.target;
            let data = new FormData(form);


            // ✅ Auto Increment ID (page session)
            if (!localStorage.getItem("formCounter")) {
                localStorage.setItem("formCounter", 0);
            }

            let count = parseInt(localStorage.getItem("formCounter")) + 1;
            localStorage.setItem("formCounter", count);

            // Final ID
            let autoID = "#" + count;
            data.set("ID", autoID);


            // Set Date & Time
            let now = new Date();
            data.set("Date", now.toLocaleDateString());
            data.set("Time", now.toLocaleTimeString());

            fetch("https://sheetdb.io/api/v1/3j5wmhm6f1i2b", {
                method: "POST",
                body: data
            })
                .then(response => response.json())
                .then(result => {
                    alert("Form Submitted Successfully!");
                    form.reset();
                })
                .catch(error => {
                    alert("Error submitting form");
                    console.error(error);
                });
        });
    </script>

</body>

</html>
