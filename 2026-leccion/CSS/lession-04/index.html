<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lession-04</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-size: 1.5rem;
        min-height: 200vh;
    }

    .outer-containner {
        border: 3px dashed black;
        width: 75vw;
        height: 85vh;
        margin: 40px auto;
        position: relative;
        
    }

    .inner-containner {
        border: 2px solid blue;
        width: 40vw;
        height: 50vh;
        margin: 200px auto;
        /* position: relative; */
    }

    .box{
        width: 150px;
        height: 150px;
        color: aliceblue;
        padding: 1rem;
        text-align: center;
        
    }

    .absolute{
        background-color: rgb(0, 0, 0);
        position: absolute;
        top: 0;
        left: 0;
    }

    .relative{
        background-color: orangered;
        position: relative;
        top: 300px;
        left: 100px;
    }

    .fixed{
        background-color: blueviolet;
        position: fixed;
        top: 100px;
    }

    .sticky{
        background-color: rgb(251, 0, 255);
        position: sticky;
        top: 0;
    }

</style>

<body>
    <div class="outer-containner">
        <div class="inner-containner">
            <div class="box absolute">
                <p>absolute</p>
            </div>
            <div class="box relative">
                <p>relative</p>
            </div>
            <div class="box fixed">
                <p>fixed</p>
            </div>
            <div class="box sticky">
                <p>sticky</p>
            </div>

        </div>
    </div>

</body>

</html>
